<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Charity and Faith Mission</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #7f8c8d;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        .error-message.show {
            display: block;
        }
        
        .demo-info {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 13px;
        }
        
        .demo-info h3 {
            color: #2c3e50;
            margin-bottom: 12px;
            font-size: 15px;
        }
        
        .demo-info p {
            color: #7f8c8d;
            margin-bottom: 8px;
        }
        
        .demo-info strong {
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🏛️ Charity and Faith Mission</h1>
            <p>Management System Login</p>
        </div>
        
        <div class="error-message" id="error-message"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username (lowercase)" required></div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            
            <div class="form-group">
                <label for="role">Login As</label>
                <select id="role" required>
                    <option value="">Select your role</option>
                    <option value="admin">Admin</option>
                    <option value="genesis">Genesis Service</option>
                    <option value="branch">Branch Co</option>
                    <option value="pastor">Pastors Info</option>
                </select>
            </div>
            
            <button type="submit" class="login-btn">Login</button>
        </form>
        
        <div class="demo-info">
            <h3>Demo Credentials:</h3>
            <p><strong>Admin:</strong> admin / admin123</p>
            <p><strong>Genesis Service:</strong> genesis / genesis123</p>
            <p><strong>Branch Co:</strong> branch / branch123</p>
            <p><strong>Pastors Info:</strong> pastor / pastor123</p>
            <p style="margin-top:10px; font-size:12px; color:#999;">Admins can add and manage users via <em>Settings → User Management</em>.</p>
        </div>
    </div>
    
    <script>
        // Hardcoded demo credentials used as a fallback when Firestore is unavailable.
        // In production, users are managed via the Settings → User Management panel
        // and authenticated through Firebase Authentication.
        const DEMO_USERS = {
            'admin': { password: 'admin123', role: 'admin', name: 'Admin User' },
            'genesis': { password: 'genesis123', role: 'genesis', name: 'Genesis Service' },
            'branch': { password: 'branch123', role: 'branch', name: 'Branch Co' },
            'pastor': { password: 'pastor123', role: 'pastor', name: 'Pastors Info' }
        };

        // Firebase email convention: <username>@charityfaithmission.org
        const FIREBASE_EMAIL_DOMAIN = 'charityfaithmission.org';
        const APP_USERS_COLLECTION = 'appUsers';

        // Read locally-managed users created via Settings → User Management.
        // NOTE: passwords are stored in plaintext for demo purposes only (same
        // model as the hardcoded DEMO_USERS above).
        function getLocalUsers() {
            try {
                return JSON.parse(localStorage.getItem('localAppUsers')) || [];
            } catch (e) {
                console.warn('Failed to parse localAppUsers from localStorage:', e.message);
                return [];
            }
        }
        
        const form = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.remove('show');

            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const selectedRole = document.getElementById('role').value;

            if (!selectedRole) { showError('Please select a role.'); return; }

            const loginBtn = form.querySelector('.login-btn');
            loginBtn.disabled = true;

            // ── Path 1: Firebase Authentication (primary when Firebase is available) ──
            if (auth) {
                const email = `${username}@${FIREBASE_EMAIL_DOMAIN}`;
                try {
                    const credential = await auth.signInWithEmailAndPassword(email, password);
                    const uid = credential.user.uid;

                    // Look up the user's profile in Firestore to get their role.
                    let displayName = username;
                    let firestoreRole = null;
                    let hasFirestoreProfile = false;
                    if (db) {
                        try {
                            const doc = await db.collection(APP_USERS_COLLECTION).doc(uid).get();
                            if (doc.exists) {
                                const data = doc.data();
                                displayName = data.displayName || username;
                                firestoreRole = data.role || null;
                                hasFirestoreProfile = true;
                            }
                        } catch (fsErr) {
                            console.warn('Firestore profile lookup failed:', fsErr.message);
                        }
                    }

                    // If no Firestore profile found, check localStorage profile as fallback.
                    if (!hasFirestoreProfile) {
                        const localUser = getLocalUsers().find(u => u.username === username);
                        if (localUser) {
                            displayName = localUser.displayName || username;
                            firestoreRole = localUser.role || null;
                            hasFirestoreProfile = true;
                        }
                    }

                    // If a Firestore profile exists, the stored role is authoritative.
                    // If no profile is found but Firebase Auth succeeded, auto-create
                    // the profile so the user appears in admin user management and can
                    // log in without needing a separate setup step.  The Firestore
                    // security rules already permit a user to create their own profile
                    // document with any valid role (bootstrap behaviour).
                    if (!hasFirestoreProfile && db) {
                        try {
                            await db.collection(APP_USERS_COLLECTION).doc(uid).set({
                                username,
                                displayName: credential.user.displayName || username,
                                role: selectedRole,
                                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            });
                            firestoreRole = selectedRole;
                            hasFirestoreProfile = true;
                        } catch (createErr) {
                            console.warn('Could not auto-create user profile:', createErr.message);
                        }
                    }

                    if (!hasFirestoreProfile && !DEMO_USERS[username]) {
                        await auth.signOut();
                        showError('Your account is not configured. Contact an administrator.');
                        loginBtn.disabled = false;
                        return;
                    }

                    if (firestoreRole && firestoreRole !== selectedRole) {
                        await auth.signOut();
                        showError('Selected role does not match your account.');
                        loginBtn.disabled = false;
                        return;
                    }

                    // Use the Firestore role when available; fall back to selectedRole only
                    // for demo accounts that have a matching Firebase Auth entry.
                    const effectiveRole = firestoreRole || selectedRole;

                    localStorage.setItem('userSession', JSON.stringify({
                        username,
                        role: effectiveRole,
                        name: displayName,
                        firebaseUid: uid,
                        loginTime: new Date().toISOString()
                    }));
                    window.location.href = 'index.html';
                    return;
                } catch (firebaseError) {
                    const code = firebaseError.code;
                    if (code === 'auth/wrong-password' || code === 'auth/invalid-credential' || code === 'auth/invalid-login-credentials') {
                        showError('Invalid username or password.');
                        loginBtn.disabled = false;
                        return;
                    }
                    if (code === 'auth/user-not-found' || code === 'auth/user-disabled') {
                        // User doesn't have a Firebase Auth account — fall through to demo fallback.
                        console.warn('Firebase user not found, trying demo fallback.');
                    } else {
                        // Network / config errors — fall through to demo fallback.
                        console.warn('Firebase sign-in error, trying demo fallback:', firebaseError.message);
                    }
                }
            }

            // ── Path 2: Demo credential fallback ─────────────────────────────────────
            const demoUser = DEMO_USERS[username];
            if (demoUser && demoUser.password === password) {
                if (demoUser.role !== selectedRole) {
                    showError('Selected role does not match your credentials.');
                    loginBtn.disabled = false;
                    return;
                }
                localStorage.setItem('userSession', JSON.stringify({
                    username,
                    role: selectedRole,
                    name: demoUser.name,
                    loginTime: new Date().toISOString()
                }));
                window.location.href = 'index.html';
                return;
            }

            // ── Path 3: Locally-managed users (created via Settings → User Management) ──
            const localUser = getLocalUsers().find(u => u.username === username);
            if (localUser && localUser.password === password) {
                if (localUser.role !== selectedRole) {
                    showError('Selected role does not match your credentials.');
                    loginBtn.disabled = false;
                    return;
                }
                localStorage.setItem('userSession', JSON.stringify({
                    username,
                    role: localUser.role,
                    name: localUser.displayName || username,
                    loginTime: new Date().toISOString()
                }));
                window.location.href = 'index.html';
                return;
            }

            showError('Invalid username or password.');
            loginBtn.disabled = false;
        });
        
        // Initialize Firebase and check if user is already logged in
        window.addEventListener('load', () => {
            initializeFirebase();

            if (auth) {
                // Disable the form while Firebase resolves the initial auth state
                // to prevent duplicate submissions or race conditions.
                const loginBtn = form.querySelector('.login-btn');
                loginBtn.disabled = true;

                // Use Firebase auth state as the source of truth when available
                auth.onAuthStateChanged((user) => {
                    loginBtn.disabled = false;
                    const session = localStorage.getItem('userSession');
                    if (user && session) {
                        try {
                            const userSession = JSON.parse(session);
                            if (userSession.role) {
                                window.location.href = 'index.html';
                            }
                        } catch (e) {
                            localStorage.removeItem('userSession');
                        }
                    }
                });
            } else {
                // Fallback: check localStorage directly when Firebase is not configured
                const session = localStorage.getItem('userSession');
                if (session) {
                    try {
                        const userSession = JSON.parse(session);
                        if (userSession.role) {
                            window.location.href = 'index.html';
                        }
                    } catch (e) {
                        localStorage.removeItem('userSession');
                    }
                }
            }
        });
    </script>
</body>
</html>
